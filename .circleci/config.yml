version: 2.1

jobs:
  e2e-tests:
    docker:
      - image: cimg/node:20.11.0-browsers
    
    steps:
      - checkout
      
      - run:
          name: Instalando dependências
          command: yarn
      
      - run:
          name: Instalando Browsers do Playwright
          command: yarn playwright install
      
      - run:
          name: Executando testes e2e
          command: yarn run e2e
      
      - run:
          name: Upload da cobertura para Codecov
          command: |
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov -f reports/coverage/lcov.info
      
      - store_test_results:
          path: test-results
      
      - store_artifacts:
          path: playwright-report

workflows:
  version: 2
  e2e-tests-workflow:
    jobs:
      - e2e-tests
